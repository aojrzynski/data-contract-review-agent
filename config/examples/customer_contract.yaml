contract:
  name: customer_master_contract
  version: 1.0.0
  owner: data_governance_team
  description: Stable baseline contract for customer master validation demos.

dataset:
  expected_name: customer_master
  format: tabular
  grain: one row per customer
  severity_defaults:
    missing_required_column: error
    unexpected_column: warning
    type_mismatch: error
    nullability_violation: error
    uniqueness_violation: error
    allowed_values_violation: error
    range_violation: error
    pattern_violation: warning

schema:
  allow_unexpected_columns: false

columns:
  customer_id:
    required: true
    type: string
    nullable: false
    unique: true
    pattern: "^CUST-[0-9]{6}$"
    description: Stable customer identifier.
  customer_name:
    required: true
    type: string
    nullable: false
  email:
    required: true
    type: string
    nullable: false
    pattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
  signup_date:
    required: true
    type: date
    nullable: false
  status:
    required: true
    type: string
    nullable: false
    allowed_values:
      - active
      - inactive
      - trial
  lifetime_value:
    required: true
    type: number
    nullable: false
    min: 0

row_count:
  min: 1
  max: 1000000
  severity: warning
